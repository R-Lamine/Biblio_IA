events { worker_connections 1024; }
http {
    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:3000; }
    server {
        listen 80;
        location /api/ { proxy_pass http://backend; proxy_set_header Host $host; proxy_read_timeout 120s; }
        location /docs  { proxy_pass http://backend; }
        location /openapi.json { proxy_pass http://backend; }
        location / { proxy_pass http://frontend; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    }
}